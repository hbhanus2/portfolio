<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure Synapse Loader</title>
    <style>
        body {
            background-color: #0a0a12;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .loader-wrapper {
            width: 400px;
            height: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
            /* The Zoom Animation settings */
            transition: 
                transform 1.8s cubic-bezier(0.7, 0, 0.3, 1),
                opacity 1.8s ease-in,
                filter 1.8s ease-in;
            will-change: transform, opacity, filter;
        }

        .loader-wrapper.zooming {
            transform: scale(20) perspective(500px) translateZ(200px) rotate(5deg);
            opacity: 0;
            filter: blur(8px); 
        }

        .neural-canvas {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        /* --- STYLES --- */
        
        /* The connections are now very faint, just barely visible structure */
        .link {
            fill: none;
            stroke: #2a2a40;
            stroke-width: 1px;
            opacity: 0.3; /* Low opacity to emphasize the signals */
        }

        /* The Moving Signals (Synapses) */
        .signal {
            fill: #ffffff;         /* White hot center */
            stroke: #4dffbf;       /* Cyan Glow */
            stroke-width: 2px;
            filter: drop-shadow(0 0 4px #4dffbf); /* Glow effect */
            opacity: 0;            /* Start hidden */
        }

        /* Optional: Tiny dots at intersections just to mark positions, but very subtle */
        .node-dot {
            fill: #1a1a2e;
            stroke: #2a2a40;
            stroke-width: 1px;
            r: 3;
        }

    </style>
</head>
<body>

<div class="loader-wrapper">
    <svg class="neural-canvas" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
        
        <defs>
            <path id="p_main_curve1" d="M50,200 Q200,50 350,200" />
            <path id="p_main_curve2" d="M50,200 Q200,350 350,200" />
            <path id="p_center_v" d="M200,50 L200,350" />
            <path id="p_center_h" d="M50,200 L350,200" />
            
            <path id="p_diag_tl" d="M100,100 L200,200" />
            <path id="p_diag_tr" d="M300,100 L200,200" />
            <path id="p_diag_bl" d="M100,300 L200,200" />
            <path id="p_diag_br" d="M300,300 L200,200" />
            
            <path id="p_edge_top" d="M100,100 Q200,20 300,100" />
            <path id="p_edge_bot" d="M100,300 Q200,380 300,300" />
        </defs>

        <g>
            <use href="#p_main_curve1" class="link"/>
            <use href="#p_main_curve2" class="link"/>
            <use href="#p_center_v" class="link"/>
            <use href="#p_center_h" class="link"/>
            <use href="#p_diag_tl" class="link"/>
            <use href="#p_diag_tr" class="link"/>
            <use href="#p_diag_bl" class="link"/>
            <use href="#p_diag_br" class="link"/>
            <use href="#p_edge_top" class="link"/>
            <use href="#p_edge_bot" class="link"/>
        </g>

        <g>
            <circle cx="200" cy="200" class="node-dot"/>
            <circle cx="50" cy="200" class="node-dot"/>
            <circle cx="350" cy="200" class="node-dot"/>
            <circle cx="200" cy="50" class="node-dot"/>
            <circle cx="200" cy="350" class="node-dot"/>
            <circle cx="100" cy="100" class="node-dot"/>
            <circle cx="300" cy="100" class="node-dot"/>
            <circle cx="100" cy="300" class="node-dot"/>
            <circle cx="300" cy="300" class="node-dot"/>
        </g>

        <circle r="3" class="signal s1"/>
        <circle r="3" class="signal s2"/>
        <circle r="3" class="signal s3"/>
        <circle r="3" class="signal s4"/>
        <circle r="3" class="signal s5"/>
        <circle r="3" class="signal s6"/>
        <circle r="3" class="signal s7"/>
        <circle r="3" class="signal s8"/>

    </svg>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/animejs/3.2.1/anime.min.js"></script>

<script>
    // --- 1. The Particle Animation ---
    function animateSignal(targetSelector, pathSelector, duration, delay, direction = 'normal') {
        const path = anime.path(pathSelector);
        anime({
            targets: targetSelector,
            translateX: path('x'),
            translateY: path('y'),
            rotate: path('angle'),
            easing: 'easeInOutSine',
            duration: duration,
            loop: true,
            direction: direction,
            delay: delay,
            opacity: [
                {value: 1, duration: 100, easing: 'linear'},
                {value: 1, duration: duration - 200},
                {value: 0, duration: 100, easing: 'linear'}
            ]
        });
    }

    animateSignal('.s1', '#p_main_curve1', 4000, 0);
    animateSignal('.s2', '#p_main_curve2', 4500, 1000, 'alternate');
    animateSignal('.s3', '#p_center_v', 3000, 500);
    animateSignal('.s4', '#p_diag_tl', 2500, 200);
    animateSignal('.s5', '#p_diag_tr', 2600, 800, 'alternate');
    animateSignal('.s6', '#p_diag_bl', 2700, 1500);
    animateSignal('.s7', '#p_edge_top', 5000, 0, 'alternate');
    animateSignal('.s8', '#p_center_h', 3500, 2000);


    // --- 2. The Zoom Sequence Logic ---
    const wrapper = document.querySelector('.loader-wrapper');

    function triggerZoomOut() {
        wrapper.classList.add('zooming');
        setTimeout(resetAnimation, 2800); 
    }

    function resetAnimation() {
        wrapper.style.transition = 'none';
        wrapper.classList.remove('zooming');
        void wrapper.offsetWidth; 
        wrapper.style.transition = '';
        setTimeout(triggerZoomOut, 3000);
    }

    // Start loop
    setTimeout(triggerZoomOut, 3000);

</script>

</body>
</html>
